name: Build War3Trainer

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]

jobs:
  build:
    runs-on: windows-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Setup MSBuild
      uses: microsoft/setup-msbuild@v2

    - name: Setup NuGet
      uses: NuGet/setup-nuget@v2

    - name: Restore Packages
      run: nuget restore War3Trainer.sln

    - name: Build Solution
      run: msbuild War3Trainer.sln /p:Configuration=Release /p:Platform="Any CPU"

    - name: Upload Artifacts
      uses: actions/upload-artifact@v4
      with:
        name: War3Trainer-Release
        path: War3Trainer/bin/Release/